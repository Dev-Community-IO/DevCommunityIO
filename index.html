<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="DevCommunity - Where Developers Build the Future" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- Favicon - will be updated dynamically from site settings -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="shortcut icon" type="image/png" href="/icon.png" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DevCommunity" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Android Chrome PWA -->
    <meta name="application-name" content="DevCommunity" />
    <meta name="theme-color-media" content="(prefers-color-scheme: light)" />
    
    <!-- iOS Safari - will be updated dynamically from site settings -->
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="apple-touch-startup-image" href="/icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Meta tags for Open Graph (will be updated dynamically) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DevCommunity" />
    
    <!-- Title - will be updated dynamically from site settings -->
    <title>DevCommunity</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Detect API URL dynamically based on current hostname
      (function() {
        if (typeof window !== 'undefined') {
          const hostname = window.location.hostname;
          const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
          
          let apiBaseUrl = 'http://localhost:3333';
          if (isLocalhost) {
            apiBaseUrl = 'http://localhost:3333';
          } else {
            // For IP addresses like 10.219.158.234:3334, use 10.219.158.234:3333
            apiBaseUrl = `http://${hostname}:3333`;
          }
          
          // Store API URL in window for React app to use
          window.__API_BASE_URL__ = apiBaseUrl;
          console.log('🌐 Detected API URL:', apiBaseUrl);
        }
      })();
    </script>
  </body>
</html>
