name: Bug report
description: Report something that is broken in the frontend
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search existing issues first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Firefox 128 on macOS 15
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or release
      description: Git commit SHA, tag, or "main"
      placeholder: main
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console / network errors
      description: Paste relevant browser console or network tab errors.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I am not reporting a security vulnerability (use Security Advisories instead)
          required: true
