name: Feature request
description: Suggest an idea for the frontend
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I am willing to help implement this if needed
          required: false
